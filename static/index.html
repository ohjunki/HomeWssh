<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>wssh</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --user-bg: #1f6feb;
  --ai-bg: #21262d;
  --danger: #da3633;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* PROJECT TABS */
#proj-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  overflow-x: auto;
  scrollbar-width: none;
  padding: env(safe-area-inset-top, 0px) 8px 0 8px;
  flex-shrink: 0;
  min-height: 42px;
}
#proj-bar::-webkit-scrollbar { display: none; }

.proj-tab {
  white-space: nowrap;
  padding: 7px 14px;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  border: 1px solid transparent;
  border-bottom: none;
  flex-shrink: 0;
  transition: color 0.1s;
  user-select: none;
}
.proj-tab.active {
  color: var(--text);
  background: var(--bg);
  border-color: var(--border);
}
.proj-tab:not(.active):hover { color: var(--text); }

/* SESSION TABS */
#sess-bar {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 5px 8px 0;
  flex-shrink: 0;
  min-height: 34px;
}
#sess-bar::-webkit-scrollbar { display: none; }
#sess-bar.hidden { display: none; }

.sess-tab {
  white-space: nowrap;
  padding: 5px 12px;
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  font-size: 12px;
  color: var(--muted);
  border: 1px solid transparent;
  border-bottom: none;
  flex-shrink: 0;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.1s;
  user-select: none;
}
.sess-tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
}
.sess-tab:not(.active):hover { color: var(--text); }

.sess-add {
  padding: 5px 10px 7px;
  font-size: 17px;
  line-height: 1;
  color: var(--muted);
  cursor: pointer;
  flex-shrink: 0;
}
.sess-add:hover { color: var(--accent); }

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* EMPTY */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  gap: 8px;
  font-size: 14px;
}

/* TOOLBAR */
#toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 5px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#toolbar .proj-path { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  flex-shrink: 0;
}
.tool-btn:hover { color: var(--danger); border-color: var(--danger); }

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 90%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  background: var(--user-bg);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  background: var(--ai-bg);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}
.msg.thinking {
  background: var(--ai-bg);
  align-self: flex-start;
  color: var(--muted);
  font-style: italic;
  border: 1px dashed var(--border);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

/* INPUT */
#input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
#input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  padding: 10px 14px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 130px;
  font-family: inherit;
  line-height: 1.4;
  overflow-y: auto;
}
#input:focus { border-color: var(--accent); }
#send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
#send-btn:disabled { opacity: 0.35; cursor: default; }
</style>
</head>
<body>

<div id="proj-bar"></div>
<div id="sess-bar" class="hidden"></div>
<div id="main"></div>

<script>
let projects = [];
let sessions = [];
let activeProject = null;
let activeSession = null;
let isSending = false;

// ── PERSIST ───────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('wssh_proj', activeProject || '');
    if (activeProject && activeSession)
      localStorage.setItem(`wssh_sess_${activeProject}`, activeSession);
  } catch {}
}
function loadState() {
  try {
    return {
      proj: localStorage.getItem('wssh_proj') || null,
      sess: (p) => localStorage.getItem(`wssh_sess_${p}`) || null,
    };
  } catch { return { proj: null, sess: () => null }; }
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/projects');
  projects = await res.json();
  renderProjBar();

  const saved = loadState();
  const target = saved.proj && projects.find(p => p.name === saved.proj);
  if (target) {
    await selectProject(target.name, saved.sess(target.name));
  } else if (projects.length > 0) {
    await selectProject(projects[0].name);
  } else {
    showEmpty('프로젝트가 없어요 (JKProject 폴더를 확인해주세요)');
  }
}

// ── PROJECT BAR ───────────────────────────────────────
function renderProjBar() {
  const bar = document.getElementById('proj-bar');
  bar.innerHTML = '';
  projects.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'proj-tab' + (p.name === activeProject ? ' active' : '');
    tab.textContent = p.name;
    tab.onclick = () => selectProject(p.name);
    bar.appendChild(tab);
  });
}

async function selectProject(name, preferSessId) {
  activeProject = name;
  saveState();
  renderProjBar();

  const res = await fetch(`/api/projects/${name}/sessions`);
  sessions = await res.json();

  if (sessions.length === 0) {
    // auto-create first session
    const r = await fetch(`/api/projects/${name}/sessions`, { method: 'POST' });
    const s = await r.json();
    sessions = [s];
  }

  const preferred = preferSessId && sessions.find(s => s.id === preferSessId);
  await selectSession(preferred ? preferred.id : sessions[0].id);
}

// ── SESSION BAR ───────────────────────────────────────
function renderSessBar() {
  const bar = document.getElementById('sess-bar');
  bar.className = '';
  bar.innerHTML = '';
  sessions.forEach(s => {
    const tab = document.createElement('div');
    tab.className = 'sess-tab' + (s.id === activeSession ? ' active' : '');
    tab.textContent = s.name;
    tab.title = s.name;
    tab.onclick = () => selectSession(s.id);
    bar.appendChild(tab);
  });
  const add = document.createElement('div');
  add.className = 'sess-add';
  add.textContent = '+';
  add.title = '새 세션';
  add.onclick = newSession;
  bar.appendChild(add);
}

async function newSession() {
  const res = await fetch(`/api/projects/${activeProject}/sessions`, { method: 'POST' });
  const s = await res.json();
  sessions.unshift(s);
  await selectSession(s.id);
}

// ── SESSION SELECT ─────────────────────────────────────
async function selectSession(sid) {
  activeSession = sid;
  saveState();
  renderSessBar();

  const res = await fetch(`/api/sessions/${sid}/messages`);
  const messages = await res.json();
  renderChat(messages);
}

// ── CHAT ──────────────────────────────────────────────
function renderChat(messages) {
  const proj = projects.find(p => p.name === activeProject);
  document.getElementById('main').innerHTML = `
    <div id="toolbar">
      <span class="proj-path">${esc(proj?.path || '')}</span>
      <button class="tool-btn" onclick="resetSession()">초기화</button>
    </div>
    <div id="chat"></div>
    <div id="input-area">
      <textarea id="input" placeholder="메시지 입력..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMsg()">↑</button>
    </div>`;

  const chat = document.getElementById('chat');
  messages.forEach(m => addBubble(chat, m.role, m.content));
  scrollBottom();

  const ta = document.getElementById('input');
  ta.addEventListener('input', autoResize);
  ta.addEventListener('keydown', handleKey);
  ta.focus();
}

function addBubble(container, role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  container.appendChild(div);
  return div;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    if (!isSending) sendMsg();
  }
}

function autoResize() {
  const ta = document.getElementById('input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
}

function scrollBottom() {
  const chat = document.getElementById('chat');
  if (chat) chat.scrollTop = chat.scrollHeight;
}

async function sendMsg() {
  if (!activeSession || isSending) return;
  const ta = document.getElementById('input');
  const text = ta.value.trim();
  if (!text) return;

  isSending = true;
  ta.value = '';
  ta.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const chat = document.getElementById('chat');
  addBubble(chat, 'user', text);
  const thinking = document.createElement('div');
  thinking.className = 'msg thinking';
  thinking.textContent = '생각 중...';
  chat.appendChild(thinking);
  scrollBottom();

  try {
    const res = await fetch(`/api/sessions/${activeSession}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    thinking.remove();
    addBubble(chat, 'assistant', res.ok ? data.reply : ('오류: ' + (data.detail || '알 수 없음')));

    // Update session name in tab after first message
    if (res.ok && data.session_name) {
      const s = sessions.find(s => s.id === activeSession);
      if (s) { s.name = data.session_name; renderSessBar(); }
    }
  } catch (e) {
    thinking.remove();
    addBubble(chat, 'assistant', '연결 오류: ' + e.message);
  }

  scrollBottom();
  isSending = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input')?.focus();
}

async function resetSession() {
  if (!activeSession || !confirm('이 세션의 대화를 초기화할까요?')) return;
  await fetch(`/api/sessions/${activeSession}/reset`, { method: 'POST' });
  const s = sessions.find(s => s.id === activeSession);
  if (s) s.name = s.name; // keep name
  renderChat([]);
}

// ── EMPTY ─────────────────────────────────────────────
function showEmpty(msg) {
  document.getElementById('sess-bar').className = 'hidden';
  document.getElementById('main').innerHTML =
    `<div class="empty"><span>${esc(msg)}</span></div>`;
}

// ── UTIL ─────────────────────────────────────────────
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
